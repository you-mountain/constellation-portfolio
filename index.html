<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Constellation | Night Sky</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050510;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #linesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        #starsContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
        }

        .star-wrapper {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 3;
        }

        .star-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(255,180,50,0.4) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transition: all 0.3s;
        }

        .star-core {
            position: relative;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 35% 35%, #ffffff, #ffdd88);
            border-radius: 50%;
            box-shadow: 
                0 0 15px #ffbb44,
                0 0 35px #ff9933,
                0 0 60px rgba(255, 140, 20, 0.6);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .star-wrapper:hover .star-core {
            width: 26px;
            height: 26px;
            box-shadow: 
                0 0 25px #ffcc66,
                0 0 50px #ffaa33,
                0 0 90px rgba(255, 120, 10, 0.8),
                0 0 140px rgba(255, 100, 0, 0.5);
        }

        .star-wrapper:hover .star-glow {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(255,200,80,0.6) 0%, transparent 70%);
        }

        /* ========== لیبل ========== */
        .star-label {
            position: absolute;
            color: #bcc8ee;
            font-size: 11px;
            pointer-events: none;
            transform: translate(-50%, 22px);
            text-align: center;
            text-shadow: 0 0 8px #335599;
            white-space: nowrap;
            font-weight: 300;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .star-wrapper:hover .star-label {
            color: #ffffff;
            text-shadow: 0 0 15px #6699ff;
            transform: translate(-50%, 28px);
        }

        .main-title {
            position: fixed;
            top: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 4;
            pointer-events: none;
        }

        .main-title h1 {
            font-size: 38px;
            font-weight: 200;
            letter-spacing: 8px;
            color: #d8e4ff;
            text-shadow: 
                0 0 20px #4a6db5,
                0 0 50px #2a4d95,
                0 0 80px #1a3d75;
            animation: titleGlow 3s ease-in-out infinite;
            margin: 0;
        }

        @keyframes titleGlow {
            0%, 100% { 
                text-shadow: 0 0 20px #4a6db5, 0 0 50px #2a4d95, 0 0 80px #1a3d75;
            }
            50% { 
                text-shadow: 0 0 30px #6a8dc5, 0 0 70px #4a6db5, 0 0 110px #2a4d95;
            }
        }

        .main-title .subtitle {
            font-size: 13px;
            font-weight: 300;
            color: #8899cc;
            letter-spacing: 5px;
            margin-top: 5px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 98;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            position: relative;
            width: 400px;
            max-width: 90vw;
            background: rgba(15, 20, 45, 0.8);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 0;
            z-index: 99;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255, 180, 100, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        @keyframes modalPop {
            from { 
                opacity: 0;
                transform: scale(0.85) translateY(30px);
            }
            to { 
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 200, 150, 0.5) 20%, 
                rgba(255, 200, 150, 0.7) 50%, 
                rgba(255, 200, 150, 0.5) 80%, 
                transparent);
            z-index: 2;
        }

        .modal-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ffcc88;
            border-radius: 50%;
            animation: floatParticle 5s ease-in-out infinite;
            opacity: 0;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 85%; top: 15%; animation-delay: 0.7s; }
        .particle:nth-child(3) { left: 20%; top: 80%; animation-delay: 1.4s; }
        .particle:nth-child(4) { left: 75%; top: 75%; animation-delay: 2.1s; }
        .particle:nth-child(5) { left: 50%; top: 10%; animation-delay: 2.8s; }
        .particle:nth-child(6) { left: 40%; top: 90%; animation-delay: 3.5s; }

        @keyframes floatParticle {
            0%, 100% { opacity: 0; transform: translateY(0) translateX(0) scale(0); }
            25% { opacity: 0.7; transform: translateY(-20px) translateX(10px) scale(1.5); }
            50% { opacity: 0.3; transform: translateY(-35px) translateX(-8px) scale(1); }
            75% { opacity: 0.6; transform: translateY(-15px) translateX(-15px) scale(1.8); }
        }

        .modal-inner {
            position: relative;
            z-index: 3;
            padding: 30px 25px 25px;
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 15px;
            z-index: 4;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aabbdd;
            font-size: 16px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .close-btn:hover {
            color: #ffffff;
            background: rgba(255, 80, 40, 0.2);
            border-color: rgba(255, 140, 80, 0.4);
            transform: rotate(90deg);
            box-shadow: 0 0 20px rgba(255, 100, 40, 0.3);
        }
        .modal h2 {
            color: #ffeacc;
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 18px;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255, 200, 150, 0.4);
        }

        .modal p {
            color: #ccddef;
            line-height: 1.9;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .modal b, .modal strong {
            color: #ffeacc;
            font-weight: 500;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }

        .skill-tag {
            background: rgba(255, 200, 150, 0.08);
            border: 1px solid rgba(255, 200, 150, 0.2);
            color: #ffeacc;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            transition: all 0.3s;
        }

        .skill-tag:hover {
            background: rgba(255, 180, 100, 0.18);
            border-color: rgba(255, 200, 150, 0.5);
            box-shadow: 0 0 12px rgba(255, 150, 50, 0.25);
            transform: translateY(-2px);
        }

        .social-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .social-btn {
            display: inline-block;
            color: #ffcc88;
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid rgba(255, 200, 150, 0.25);
            border-radius: 22px;
            font-size: 13px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.02);
        }

        .social-btn:hover {
            color: #ffffff;
            background: rgba(255, 150, 80, 0.15);
            border-color: rgba(255, 180, 120, 0.6);
            box-shadow: 0 0 20px rgba(255, 150, 60, 0.3);
            transform: translateY(-2px);
        }

        .timeline-item {
            text-align: left;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .timeline-item:last-child {
            border-bottom: none;
        }

        .timeline-item .date {
            font-size: 11px;
            color: #8899bb;
        }

        .timeline-item .role {
            color: #ffeacc;
            font-size: 13px;
            font-weight: 500;
        }

        .emoji-display {
            font-size: 40px;
            display: block;
            margin-bottom: 15px;
            animation: floatEmoji 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(255, 200, 150, 0.5));
        }

        @keyframes floatEmoji {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 5;
            color: #667799;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 14px;
            border-radius: 16px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(5px);
        }

        /* رسپانسیو */
        @media (max-width: 600px) {
            .main-title h1 {
                font-size: 28px;
                letter-spacing: 5px;
            }
            .modal {
                width: 92vw;
            }
            .modal-inner {
                padding: 22px 18px 18px;
            }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <canvas id="linesCanvas"></canvas>

    <div class="main-title">
        <h1>✦ MY CONSTELLATION ✦</h1>
        <div class="subtitle">a map of my universe</div>
    </div>

    <div id="starsContainer"></div>

    <div class="modal-overlay" id="overlay">
        <div class="modal">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div class="modal-particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>
            <div class="modal-inner">
                <h2 id="modalTitle">Star Name</h2>
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <div class="hint">✨ Click on the stars</div>

    <script>
        const stars = [
            {
                id: 'about',
                label: 'About Me',
                x: 18,
                y: 28,
                connect: ['skills', 'contact'],
                emoji: '🌌',
                title: 'About Me',
                content: `
                    <span class="emoji-display">🌌</span>
                    <p>Hey there! I'm <strong>Alex Morgan</strong></p>
                    <p>Full-Stack Developer & UI Designer</p>
                    <p>📍 San Francisco, CA</p>
                    <p>I build digital experiences that live at the intersection of creativity and technology.</p>
                `
            },
            {
                id: 'skills',
                label: 'Skills',
                x: 48,
                y: 18,
                connect: ['about', 'projects', 'experience'],
                emoji: '⚡',
                title: 'Skills & Tools',
                content: `
                    <span class="emoji-display">⚡</span>
                    <p><strong>Technical Expertise</strong></p>
                    <div class="skill-tags">
                        <span class="skill-tag">React</span>
                        <span class="skill-tag">Vue.js</span>
                        <span class="skill-tag">TypeScript</span>
                        <span class="skill-tag">Node.js</span>
                        <span class="skill-tag">Python</span>
                        <span class="skill-tag">Three.js</span>
                        <span class="skill-tag">UI/UX Design</span>
                        <span class="skill-tag">Figma</span>
                        <span class="skill-tag">Docker</span>
                        <span class="skill-tag">AWS</span>
                    </div>
                `
            },
            {
                id: 'experience',
                label: 'Experience',
                x: 78,
                y: 22,
                connect: ['skills', 'projects'],
                emoji: '💼',
                title: 'Work Experience',
                content: `
                    <span class="emoji-display">💼</span>
                    <div class="timeline-item">
                        <div class="date">2023 - Present</div>
                        <div class="role">Senior Frontend Developer</div>
                        <div style="color:#8899bb;font-size:11px;">TechCorp Inc.</div>
                    </div>
                    <div class="timeline-item">
                        <div class="date">2021 - 2023</div>
                        <div class="role">Full-Stack Developer</div>
                        <div style="color:#8899bb;font-size:11px;">StartUp Studio</div>
                    </div>
                    <div class="timeline-item">
                        <div class="date">2019 - 2021</div>
                        <div class="role">UI/UX Designer</div>
                        <div style="color:#8899bb;font-size:11px;">DesignLab Agency</div>
                    </div>
                `
            },
            {
                id: 'projects',
                label: 'Projects',
                x: 88,
                y: 48,
                connect: ['skills', 'experience', 'contact'],
                emoji: '🚀',
                title: 'Featured Projects',
                content: `
                    <span class="emoji-display">🚀</span>
                    <p><strong>Recent Work</strong></p>
                    <div class="social-links">
                        <a href="#" class="social-btn">🌌 Galaxy Dashboard</a>
                        <a href="#" class="social-btn">⭐ E-Commerce App</a>
                        <a href="#" class="social-btn">💫 3D Portfolio</a>
                        <a href="#" class="social-btn">🎨 Design System</a>
                    </div>
                `
            },
            {
                id: 'contact',
                label: 'Contact',
                x: 58,
                y: 68,
                connect: ['about', 'projects', 'blog'],
                emoji: '📡',
                title: 'Get in Touch',
                content: `
                    <span class="emoji-display">📡</span>
                    <p><strong>Let's Connect!</strong></p>
                    <div class="social-links">
                        <a href="mailto:alex@email.com" class="social-btn">📧 Email</a>
                        <a href="#" class="social-btn">🐦 Twitter</a>
                        <a href="#" class="social-btn">💼 LinkedIn</a>
                        <a href="#" class="social-btn">💻 GitHub</a>
                    </div>
                `
            },
            {
                id: 'blog',
                label: 'Blog',
                x: 28,
                y: 62,
                connect: ['contact', 'about'],
                emoji: '📝',
                title: 'Latest Writings',
                content: `
                    <span class="emoji-display">📝</span>
                    <div class="timeline-item">
                        <div class="date">Dec 2024</div>
                        <div class="role">Building Interactive Constellations</div>
                    </div>
                    <div class="timeline-item">
                        <div class="date">Nov 2024</div>
                        <div class="role">The Art of Glassmorphism in UI</div>
                    </div>
                    <div class="timeline-item">
                        <div class="date">Oct 2024</div>
                        <div class="role">Optimizing 3D Web Performance</div>
                    </div>
                    <a href="#" class="social-btn" style="margin-top:10px;">🌠 Read All Posts</a>
                `
            }
        ];

        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        let bgStars = [];

        function initBgStars() {
            bgStars = [];
            for (let i = 0; i < 400; i++) {
                bgStars.push({
                    x: Math.random() * bgCanvas.width,
                    y: Math.random() * bgCanvas.height,
                    r: Math.random() * 2 + 0.3,
                    o: Math.random() * 0.6 + 0.3,
                    s: Math.random() * 0.015 + 0.005,
                    p: Math.random() * Math.PI * 2
                });
            }
        }

        function drawBg() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            initBgStars();

            function animate() {
                bgCtx.fillStyle = '#050510';
                bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

                const t = Date.now() * 0.001;
                bgStars.forEach(s => {
                    const flicker = Math.sin(t * s.s * 3 + s.p) * 0.2;
                    const alpha = Math.max(0.05, s.o + flicker);

                    bgCtx.beginPath();
                    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    bgCtx.fillStyle = `rgba(190, 210, 255, ${alpha})`;
                    bgCtx.fill();

                    if (s.r > 1.2) {
                        bgCtx.beginPath();
                        bgCtx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
                        bgCtx.fillStyle = `rgba(140, 170, 255, ${alpha * 0.1})`;
                        bgCtx.fill();
                    }
                });

                requestAnimationFrame(animate);
            }
            animate();
        }

        const container = document.getElementById('starsContainer');

        function createStars() {
            container.innerHTML = '';

            stars.forEach(star => {
                // wrapper
                const wrapper = document.createElement('div');
                wrapper.className = 'star-wrapper';
                wrapper.style.left = star.x + '%';
                wrapper.style.top = star.y + '%';
                wrapper.onclick = () => openModal(star);

                // glow
                const glow = document.createElement('div');
                glow.className = 'star-glow';

                // core
                const core = document.createElement('div');
                core.className = 'star-core';

                wrapper.appendChild(glow);
                wrapper.appendChild(core);
                container.appendChild(wrapper);

                // label
                const label = document.createElement('div');
                label.className = 'star-label';
                label.style.left = star.x + '%';
                label.style.top = star.y + '%';
                label.textContent = star.label;
                container.appendChild(label);
            });
        }

        const linesCanvas = document.getElementById('linesCanvas');
        const linesCtx = linesCanvas.getContext('2d');

        function drawLines() {
            linesCanvas.width = window.innerWidth;
            linesCanvas.height = window.innerHeight;
            linesCtx.clearRect(0, 0, linesCanvas.width, linesCanvas.height);

            const drawn = new Set();

            stars.forEach(star => {
                if (!star.connect) return;
                star.connect.forEach(targetId => {
                    const pair = [star.id, targetId].sort().join('-');
                    if (drawn.has(pair)) return;
                    drawn.add(pair);

                    const target = stars.find(s => s.id === targetId);
                    if (!target) return;

                    const x1 = (star.x / 100) * linesCanvas.width;
                    const y1 = (star.y / 100) * linesCanvas.height;
                    const x2 = (target.x / 100) * linesCanvas.width;
                    const y2 = (target.y / 100) * linesCanvas.height;

                    linesCtx.beginPath();
                    linesCtx.moveTo(x1, y1);
                    linesCtx.lineTo(x2, y2);
                    linesCtx.strokeStyle = 'rgba(255, 190, 140, 0.3)';
                    linesCtx.lineWidth = 1.5;
                    linesCtx.setLineDash([7, 5]);
                    linesCtx.shadowColor = 'rgba(255, 160, 80, 0.4)';
                    linesCtx.shadowBlur = 10;
                    linesCtx.stroke();
                    linesCtx.shadowBlur = 0;
                    linesCtx.setLineDash([]);
                });
            });
        }

        const overlay = document.getElementById('overlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');

        function openModal(star) {
            modalTitle.textContent = star.title || star.label;
            modalContent.innerHTML = star.content;
            overlay.classList.add('active');
        }

        function closeModal() {
            overlay.classList.remove('active');
        }

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        window.addEventListener('resize', () => {
            createStars();
            drawLines();
        });

        function init() {
            drawBg();
            createStars();
            setTimeout(drawLines, 100);
        }

        init();
        setInterval(drawLines, 2000);
    </script>
</body>
</html>
